name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore RentalApp.Test/RentalApp.Test.csproj

    - name: Build
      run: dotnet build RentalApp.Test/RentalApp.Test.csproj --no-restore

    - name: Run tests
      run: dotnet test RentalApp.Test/RentalApp.Test.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Run migrations
      env:
        CONNECTION_STRING: "Host=localhost;Username=app_user;Password=app_password;Database=appdb"
      run: dotnet run --project RentalApp.Migrations/RentalApp.Migrations.csproj
